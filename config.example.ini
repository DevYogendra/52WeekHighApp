# Copy this file to config.local.ini and fill in your values.
# config.local.ini is gitignored — never commit your real credentials.

[credentials]
username = your_email@example.com
password = your_password

[automation]
# Path to your Python interpreter (defaults to the one running the script)
python_cmd = python
# Git branch to push from (leave blank to skip branch check)
repo_branch = main
